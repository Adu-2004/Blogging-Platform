<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#EFF6FF"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BFDBFE"/>
      <stop offset="100%" style="stop-color:#93C5FD"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E3A8A" flood-opacity="0.3"/>
    </filter>
    <filter id="lockGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="640" fill="url(#bgGrad)"/>

  <!-- Animated floating circles background -->
  <circle cx="50" cy="100" r="60" fill="#93C5FD" opacity="0.2">
    <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="500" r="90" fill="#93C5FD" opacity="0.15">
    <animate attributeName="cy" values="500;480;500" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="80" r="40" fill="#60A5FA" opacity="0.2">
    <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="560" r="50" fill="#BFDBFE" opacity="0.3">
    <animate attributeName="cy" values="560;540;560" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid dots pattern -->
  <g opacity="0.2">
    <circle cx="40" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="80" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="120" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="160" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="200" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="240" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="280" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="320" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="360" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="400" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="440" cy="40" r="2" fill="#3B82F6"/>
    <circle cx="40" cy="80" r="2" fill="#3B82F6"/>
    <circle cx="80" cy="80" r="2" fill="#3B82F6"/>
    <circle cx="120" cy="80" r="2" fill="#3B82F6"/>
    <circle cx="40" cy="600" r="2" fill="#3B82F6"/>
    <circle cx="80" cy="600" r="2" fill="#3B82F6"/>
    <circle cx="400" cy="600" r="2" fill="#3B82F6"/>
    <circle cx="440" cy="600" r="2" fill="#3B82F6"/>
    <circle cx="440" cy="560" r="2" fill="#3B82F6"/>
    <circle cx="440" cy="520" r="2" fill="#3B82F6"/>
  </g>

  <!-- ══ LAPTOP ══ -->
  <!-- Screen outer frame -->
  <rect x="90" y="140" width="300" height="200" rx="12" fill="#1E40AF" filter="url(#shadow)"/>
  <!-- Screen inner (display) -->
  <rect x="98" y="148" width="284" height="186" rx="8" fill="url(#screenGrad)"/>

  <!-- Website UI on screen -->
  <!-- Browser bar -->
  <rect x="98" y="148" width="284" height="22" rx="8" fill="#DBEAFE"/>
  <rect x="98" y="158" width="284" height="12" fill="#DBEAFE"/>
  <circle cx="114" cy="159" r="4" fill="#FCA5A5"/>
  <circle cx="126" cy="159" r="4" fill="#FDE68A"/>
  <circle cx="138" cy="159" r="4" fill="#86EFAC"/>
  <!-- URL bar -->
  <rect x="150" y="154" width="160" height="10" rx="5" fill="white" opacity="0.8"/>
  <text x="230" y="162" font-family="monospace" font-size="6" fill="#6B7280" text-anchor="middle">bloggify.com</text>

  <!-- Lock icon on screen (the website lock) -->
  <g transform="translate(195, 185)">
    <!-- Lock body -->
    <rect x="0" y="14" width="50" height="38" rx="8" fill="url(#shieldGrad)" opacity="0.95"/>
    <!-- Lock shackle -->
    <path d="M10 14 L10 6 Q25 -4 40 6 L40 14" fill="none" stroke="#3B82F6" stroke-width="5" stroke-linecap="round">
      <animate attributeName="d"
        values="M10 14 L10 6 Q25 -4 40 6 L40 14;M10 14 L10 -2 Q25 -12 40 -2 L40 14;M10 14 L10 6 Q25 -4 40 6 L40 14"
        dur="2s" begin="2s" fill="freeze"/>
    </path>
    <!-- Keyhole -->
    <circle cx="25" cy="30" r="7" fill="#3B82F6" opacity="0.8"/>
    <rect x="21" y="30" width="8" height="10" rx="2" fill="#3B82F6" opacity="0.8"/>
    <!-- Unlock glow -->
    <circle cx="25" cy="30" r="12" fill="#60A5FA" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="12;18;12" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Username field on screen -->
  <rect x="118" y="248" width="244" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="130" y="258" font-family="monospace" font-size="7" fill="#9CA3AF">👤 username</text>
  <!-- Typing dots animation -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <rect x="118" y="248" width="244" height="14" rx="4" fill="#EFF6FF" opacity="0.95"/>
    <text x="130" y="258" font-family="monospace" font-size="7" fill="#1D4ED8">👤 sakshi_dev</text>
    <rect x="230" y="251" width="1.5" height="8" rx="1" fill="#1D4ED8">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Password field on screen -->
  <rect x="118" y="268" width="244" height="14" rx="4" fill="white" opacity="0.9"/>
  <text x="130" y="278" font-family="monospace" font-size="7" fill="#9CA3AF">🔒 password</text>
  <!-- Password dots appear -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" dur="4s" begin="1s" repeatCount="indefinite"/>
    <rect x="118" y="268" width="244" height="14" rx="4" fill="#EFF6FF" opacity="0.95"/>
    <text x="130" y="278" font-family="monospace" font-size="9" fill="#1D4ED8">🔒 ••••••••</text>
  </g>

  <!-- Laptop base/keyboard -->
  <rect x="70" y="340" width="340" height="14" rx="4" fill="#1E40AF"/>
  <rect x="60" y="354" width="360" height="8" rx="4" fill="#1E3A8A"/>
  <!-- Keyboard keys hint -->
  <rect x="120" y="343" width="240" height="6" rx="2" fill="#2563EB" opacity="0.5"/>
  <rect x="195" y="355" width="90" height="4" rx="2" fill="#1D4ED8" opacity="0.4"/>

  <!-- ══ PERSON ══ -->
  <!-- Body / torso -->
  <ellipse cx="240" cy="510" rx="55" ry="40" fill="url(#bodyGrad)" opacity="0.9"/>

  <!-- Arms reaching toward laptop -->
  <!-- Left arm -->
  <path d="M185 505 Q160 470 155 390" fill="none" stroke="#93C5FD" stroke-width="18" stroke-linecap="round">
    <animate attributeName="d" values="M185 505 Q160 470 155 390;M185 505 Q158 465 152 388;M185 505 Q160 470 155 390" dur="3s" repeatCount="indefinite"/>
  </path>
  <!-- Right arm -->
  <path d="M295 505 Q320 470 325 390" fill="none" stroke="#93C5FD" stroke-width="18" stroke-linecap="round">
    <animate attributeName="d" values="M295 505 Q320 470 325 390;M295 505 Q322 465 328 388;M295 505 Q320 470 325 390" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Left hand -->
  <circle cx="154" cy="386" r="12" fill="#BFDBFE"/>
  <!-- Right hand -->
  <circle cx="326" cy="386" r="12" fill="#BFDBFE"/>

  <!-- Head -->
  <circle cx="240" cy="430" r="38" fill="#BFDBFE" filter="url(#shadow)"/>
  <!-- Face -->
  <!-- Eyes -->
  <ellipse cx="227" cy="425" rx="5" ry="6" fill="#1D4ED8"/>
  <ellipse cx="253" cy="425" rx="5" ry="6" fill="#1D4ED8"/>
  <!-- Eye shine -->
  <circle cx="229" cy="423" r="2" fill="white"/>
  <circle cx="255" cy="423" r="2" fill="white"/>
  <!-- Eyebrows - focused look -->
  <path d="M220 416 Q227 413 234 416" fill="none" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M246 416 Q253 413 260 416" fill="none" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Smile - changes to focused -->
  <path d="M228 440 Q240 448 252 440" fill="none" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="d"
      values="M228 440 Q240 448 252 440;M228 440 Q240 444 252 440;M228 440 Q240 448 252 440"
      dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Hair -->
  <ellipse cx="240" cy="397" rx="38" ry="16" fill="#1E40AF"/>
  <ellipse cx="240" cy="395" rx="32" ry="10" fill="#1D4ED8"/>

  <!-- Neck -->
  <rect x="228" y="464" width="24" height="18" rx="6" fill="#BFDBFE"/>

  <!-- ══ FLOATING ELEMENTS ══ -->
  <!-- Floating key -->
  <g opacity="0" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <circle cx="380" cy="240" r="10" fill="none" stroke="#60A5FA" stroke-width="3"/>
    <rect x="388" y="237" width="18" height="6" rx="2" fill="#60A5FA"/>
    <rect x="400" y="243" width="5" height="5" rx="1" fill="#60A5FA"/>
    <rect x="408" y="243" width="5" height="5" rx="1" fill="#60A5FA"/>
  </g>

  <!-- Floating shield -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    <path d="M55 230 Q55 200 80 195 Q105 200 105 230 Q105 255 80 265 Q55 255 55 230Z" fill="#60A5FA" opacity="0.2" stroke="#60A5FA" stroke-width="2"/>
    <text x="80" y="235" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">✓</text>
  </g>

  <!-- Floating user badge -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" dur="5s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="5s" repeatCount="indefinite"/>
    <rect x="340" y="430" width="110" height="36" rx="10" fill="#1D4ED8" opacity="0.85"/>
    <text x="355" y="448" font-family="monospace" font-size="9" fill="white">👤 User verified</text>
    <text x="355" y="460" font-family="monospace" font-size="8" fill="#BFDBFE">🔒 Secure login</text>
  </g>

  <!-- Floating password dots -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="2s" repeatCount="indefinite"/>
    <circle cx="30" cy="340" r="5" fill="#60A5FA"/>
    <circle cx="45" cy="340" r="5" fill="#60A5FA"/>
    <circle cx="60" cy="340" r="5" fill="#60A5FA"/>
    <circle cx="75" cy="340" r="5" fill="#60A5FA"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;5,-5;0,0" dur="2s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- Success checkmark flash -->
  <g opacity="0" filter="url(#lockGlow)">
    <animate attributeName="opacity" values="0;0;0;1;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    <circle cx="240" cy="200" r="20" fill="#22C55E" opacity="0.9"/>
    <text x="240" y="207" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">✓</text>
  </g>

  <!-- ══ TEXT ══ -->
  <text x="240" y="580" font-family="'Trebuchet MS', sans-serif" font-size="22" font-weight="700" fill="#1D4ED8" text-anchor="middle" opacity="0">
    Welcome Back!
    <animate attributeName="opacity" values="0;1" dur="1s" begin="0.5s" fill="freeze"/>
  </text>
  <text x="240" y="605" font-family="'Trebuchet MS', sans-serif" font-size="11" font-weight="300" fill="#3B82F6" text-anchor="middle" letter-spacing="1" opacity="0">
    Sign in to your Bloggify account
    <animate attributeName="opacity" values="0;1" dur="1s" begin="1s" fill="freeze"/>
  </text>

</svg>
