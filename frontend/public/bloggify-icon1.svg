<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 66 66" width="66" height="66">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="58" height="58" rx="16" fill="url(#blueGrad)"/>

  <!-- Shine overlay -->
  <rect x="4" y="4" width="58" height="58" rx="16" fill="url(#shineGrad)"/>

  <!-- Vertical bar of B -->
  <rect x="17" y="15" width="6" height="36" rx="3" fill="white"/>

  <!-- Top bump of B -->
  <path d="M23 15 Q38 15 38 24 Q38 33 23 33" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Bottom bump of B -->
  <path d="M23 33 Q40 33 40 42 Q40 51 23 51" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>

  <!-- AI Spark star -->
  <polygon points="50,11 51.2,15 55,15 52.2,17.3 53.2,21 50,18.8 46.8,21 47.8,17.3 45,15 48.8,15"
    fill="white" filter="url(#glow)"/>

</svg>
