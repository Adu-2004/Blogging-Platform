<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 70" width="340" height="70">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueLightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93C5FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="iconClip">
      <rect x="0" y="4" width="58" height="58" rx="16"/>
    </clipPath>
  </defs>

  <!-- ── ICON ── -->
  <!-- Background with pulse animation -->
  <rect x="0" y="4" width="58" height="58" rx="16" fill="url(#blueGrad)">
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Shine sweep over icon -->
  <rect x="0" y="4" width="58" height="58" rx="16" fill="url(#shineGrad)" clip-path="url(#iconClip)">
    <animateTransform attributeName="transform" type="translate" from="-60 0" to="80 0" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Stylized "B" — vertical bar -->
  <rect x="13" y="15" width="6" height="36" rx="3" fill="white">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze"/>
  </rect>

  <!-- Top bump of B -->
  <path d="M19 15 Q34 15 34 24 Q34 33 19 33" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"
    stroke-dasharray="40" stroke-dashoffset="40">
    <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.6s" begin="0.3s" fill="freeze"/>
  </path>

  <!-- Bottom bump of B -->
  <path d="M19 33 Q36 33 36 42 Q36 51 19 51" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"
    stroke-dasharray="45" stroke-dashoffset="45">
    <animate attributeName="stroke-dashoffset" from="45" to="0" dur="0.6s" begin="0.7s" fill="freeze"/>
  </path>

  <!-- AI Spark star -->
  <polygon points="46,11 47.2,15 51,15 48.2,17.3 49.2,21 46,18.8 42.8,21 43.8,17.3 41,15 44.8,15"
    fill="white" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
    <animateTransform attributeName="transform" type="rotate" from="0 46 16" to="360 46 16" dur="6s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>

  <!-- ── WORDMARK ── -->
  <!-- "B" bold -->
  <text x="72" y="44"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="32" font-weight="800"
    fill="url(#blueGrad)" letter-spacing="-1"
    opacity="0">
    B
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- "loggify" light -->
  <text x="93" y="44"
    font-family="'Trebuchet MS', 'Gill Sans', sans-serif"
    font-size="32" font-weight="300"
    fill="#2563EB" letter-spacing="-0.5"
    opacity="0">
    loggify
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1s" fill="freeze"/>
  </text>

  <!-- Underline that draws in -->
  <rect x="72" y="49" width="0" height="2.5" rx="1.2" fill="url(#blueLightGrad)" opacity="0.5">
    <animate attributeName="width" from="0" to="210" dur="0.7s" begin="1.3s" fill="freeze"/>
  </rect>

  <!-- Tagline fade in -->
  <text x="72" y="62"
    font-family="'Trebuchet MS', Helvetica, Arial, sans-serif"
    font-size="8" font-weight="400"
    fill="#3B82F6" letter-spacing="3.5"
    opacity="0">
    AI BLOGGING PLATFORM
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.6s" fill="freeze"/>
  </text>

</svg>
